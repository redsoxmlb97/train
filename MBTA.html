<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Readville Commuter Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Space+Mono:wght@400;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; }
        .mono { font-family: 'Space Mono', monospace; }
        /* Hide native scrollbars inside embed frames to keep the matrix high-density and crisp */
        iframe::-webkit-scrollbar { display: none; }
        iframe { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-4 md:p-6">
    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-zinc-800 pb-4 mb-6 gap-4">
            <div>
                <h1 class="text-xl font-bold tracking-tight text-purple-400">🟣 READVILLE BOUND MATRICES</h1>
                <p class="text-xs text-zinc-500 mt-1">Direct Infrastructure Display Streams • Zero API Layer</p>
            </div>
            <div class="flex items-center gap-4 w-full md:w-auto justify-between md:justify-end">
                <div id="filter-controls" class="flex bg-zinc-900 border border-zinc-800 rounded-lg p-0.5 text-xs mono">
                    <button onclick="switchStation('SSTAT')" id="btn-SSTAT" class="px-3 py-1.5 rounded-md font-bold transition-all bg-purple-600 text-zinc-50">SOUTH STATION</button>
                    <button onclick="switchStation('BBAY')" id="btn-BBAY" class="px-3 py-1.5 rounded-md text-zinc-400 hover:text-zinc-200 transition-all">BACK BAY</button>
                    <button onclick="switchStation('RUGG')" id="btn-RUGG" class="px-3 py-1.5 rounded-md text-zinc-400 hover:text-zinc-200 transition-all flex items-center gap-1">RUGGLES 👑</button>
                </div>
                <div id="clock" class="mono text-lg font-bold text-zinc-400 hidden sm:block">00:00:00 AM</div>
            </div>
        </header>

        <main class="bg-zinc-900/40 border border-zinc-800 rounded-xl p-2 h-[600px] shadow-2xl relative">
            
            <div id="pane-SSTAT" class="w-full h-full rounded-lg overflow-hidden bg-black">
                <iframe 
                    src="https://www.mbta.com/components/departure-board?stop=place-sstat&direction=0" 
                    class="w-full h-full border-0 invert opacity-90 saturate-125 grayscale-[15%]"
                    title="South Station Operations Stream">
                </iframe>
            </div>

            <div id="pane-BBAY" class="w-full h-full rounded-lg overflow-hidden bg-black hidden">
                <iframe 
                    src="https://www.mbta.com/components/departure-board?stop=place-bbay&direction=0" 
                    class="w-full h-full border-0 invert opacity-90 saturate-125 grayscale-[15%]"
                    title="Back Bay Operations Stream">
                </iframe>
            </div>

            <div id="pane-RUGG" class="w-full h-full rounded-lg overflow-hidden bg-black hidden">
                <iframe 
                    src="https://www.mbta.com/components/departure-board?stop=place-rugg&direction=0" 
                    class="w-full h-full border-0 invert opacity-90 saturate-125 grayscale-[15%]"
                    title="Ruggles Operations Stream">
                </iframe>
            </div>

        </main>
    </div>

    <script>
        // High-speed switching engine to flip display panels instantly
        function switchStation(targetId) {
            const keys = ['SSTAT', 'BBAY', 'RUGG'];
            
            keys.forEach(key => {
                const pane = document.getElementById(`pane-${key}`);
                const btn = document.getElementById(`btn-${key}`);
                
                if (key === targetId) {
                    pane.classList.remove('hidden');
                    btn.className = "px-3 py-1.5 rounded-md font-bold transition-all bg-purple-600 text-zinc-50";
                } else {
                    pane.classList.add('hidden');
                    btn.className = "px-3 py-1.5 rounded-md text-zinc-400 hover:text-zinc-200 transition-all";
                }
            });
        }

        // Live Clock Loop
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
        }, 1000);
    </script>
</body>
</html>
