<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Readville Commuter Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=Space+Mono:wght@400;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; }
        .mono { font-family: 'Space Mono', monospace; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-4 md:p-6">
    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-zinc-800 pb-4 mb-6 gap-4">
            <div>
                <h1 class="text-xl font-bold tracking-tight text-purple-400">🟣 READVILLE BOUND MATRICES</h1>
                <p class="text-xs text-zinc-500 mt-1">Multi-Station Unified Telemetry Platform</p>
            </div>
            <div class="flex items-center gap-4 w-full md:w-auto justify-between md:justify-end">
                <div id="filter-controls" class="flex bg-zinc-900 border border-zinc-800 rounded-lg p-0.5 text-xs mono">
                    <button onclick="setStationFilter('ALL')" id="btn-ALL" class="px-3 py-1.5 rounded-md font-bold transition-all bg-purple-600 text-zinc-50">ALL STATIONS</button>
                    <button onclick="setStationFilter('South Station')" id="btn-SSTAT" class="px-3 py-1.5 rounded-md text-zinc-400 hover:text-zinc-200 transition-all">SSTAT</button>
                    <button onclick="setStationFilter('Back Bay')" id="btn-BBAY" class="px-3 py-1.5 rounded-md text-zinc-400 hover:text-zinc-200 transition-all">BBAY</button>
                    <button onclick="setStationFilter('Ruggles')" id="btn-RUGG" class="px-3 py-1.5 rounded-md text-zinc-400 hover:text-zinc-200 transition-all flex items-center gap-1">RUGGLES 👑</button>
                </div>
                <div id="clock" class="mono text-lg font-bold text-zinc-400 hidden sm:block">00:00:00 AM</div>
            </div>
        </header>

        <main class="bg-zinc-900/50 border border-zinc-800 rounded-xl overflow-hidden shadow-2xl">
            <table class="w-full text-left">
                <thead class="text-xs text-zinc-400 uppercase bg-zinc-900">
                    <tr>
                        <th class="py-3 px-4">Line</th>
                        <th class="py-3 px-4">Origin Station</th>
                        <th class="py-3 px-4">Departure Time</th>
                        <th class="py-3 px-4">Readville ETA</th>
                        <th class="py-3 px-4 text-right">Status</th>
                    </tr>
                </thead>
                <tbody id="board-body" class="divide-y divide-zinc-900">
                    <tr><td colspan="5" class="py-12 text-center text-zinc-500 text-sm mono animate-pulse">CONNECTING SECURELY TO MBTA LIVE STREAM...</td></tr>
                </tbody>
            </table>
        </main>
    </div>

    <script>
        const DEST_STOP_ID = 'place-DB-0095'; 
        const ORIGIN_IDS = ['place-sstat', 'place-bbay', 'place-rugg'];
        const ROUTES = 'CR-Fairmount,CR-Franklin,CR-Providence';
        
        let currentFilter = 'ALL'; 
        let cachedRuns = [];       

        function formatTime(dateObj) {
            if (!dateObj) return '--:--';
            return dateObj.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }

        function setStationFilter(stationName) {
            currentFilter = stationName;
            
            const buttons = {
                'ALL': document.getElementById('btn-ALL'),
                'South Station': document.getElementById('btn-SSTAT'),
                'Back Bay': document.getElementById('btn-BBAY'),
                'Ruggles': document.getElementById('btn-RUGG')
            };
            
            Object.keys(buttons).forEach(key => {
                if (!buttons[key]) return;
                if (key === stationName) {
                    buttons[key].className = "px-3 py-1.5 rounded-md font-bold transition-all bg-purple-600 text-zinc-50";
                } else {
                    buttons[key].className = "px-3 py-1.5 rounded-md text-zinc-400 hover:text-zinc-200 transition-all";
                }
            });
            
            renderBoard(); 
        }

        async function fetchCommuteDashboard() {
            try {
                const now = new Date();

                // Call the MBTA using secure HTTPS endpoint
                const url = `https://api-v3.mbta.com/schedules?filter[route]=${ROUTES}&include=prediction,stop&sort=departure_time`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`API Connection Dropped: ${response.status}`);
                const json = await response.json();

                if (!json.data || json.data.length === 0) {
                    cachedRuns = [];
                    renderBoard();
                    return;
                }

                const parentStopsMap = {};
                if (json.included) {
                    json.included.forEach(item => {
                        if (item.type === 'stop') {
                            const parentId = item.relationships?.parent_station?.data?.id;
                            const currentName = item.attributes?.name || '';
                            
                            if (currentName.toLowerCase().includes('back bay') || item.id.includes('bbay')) {
                                parentStopsMap[item.id] = 'place-bbay';
                            } else {
                                parentStopsMap[item.id] = parentId || item.id;
                            }
                        }
                    });
                }

                const trips = {};
                json.data.forEach(sched => {
                    const tripId = sched.relationships?.trip?.data?.id;
                    if (!tripId) return;
                    if (!trips[tripId]) trips[tripId] = [];
                    trips[tripId].push(sched);
                });

                let results = [];

                for (const tripId in trips) {
                    const legs = trips[tripId];

                    // Find if the trip stops at Readville
                    const readvilleLeg = legs.find(l => {
                        const rawStop = l.relationships?.stop?.data?.id || '';
                        return rawStop === DEST_STOP_ID || parentStopsMap[rawStop] === DEST_STOP_ID;
                    });
                    if (!readvilleLeg) continue; 

                    const schedArrTimeRaw = readvilleLeg.attributes?.arrival_time;
                    if (!schedArrTimeRaw) continue;
                    let finalArrival = new Date(schedArrTimeRaw);

                    // Grab legs matching our targeted master origin stations
                    const validOriginsInTrip = legs.filter(l => {
                        const rawStop = l.relationships?.stop?.data?.id || '';
                        const parentStop = parentStopsMap[rawStop] || rawStop;
                        return ORIGIN_IDS.includes(parentStop) || parentStop.includes('bbay');
                    });

                    validOriginsInTrip.forEach(originLeg => {
                        const schedDepTimeRaw = originLeg.attributes?.departure_time;
                        if (!schedDepTimeRaw) return;

                        let finalDeparture = new Date(schedDepTimeRaw);
                        let statusText = 'SCHEDULED';
                        let statusStyle = 'text-zinc-500 border-zinc-800 bg-zinc-900/40';

                        // Process live prediction tracking overlays safely
                        const predRefId = originLeg.relationships?.prediction?.data?.id;
                        if (predRefId && json.included) {
                            const liveData = json.included.find(i => i.type === 'prediction' && i.id === predRefId);
                            if (liveData) {
                                const liveDep = liveData.attributes?.departure_time || liveData.attributes?.arrival_time;
                                if (liveDep) finalDeparture = new Date(liveDep);
                                
                                statusText = liveData.attributes?.status ? liveData.attributes.status.toUpperCase() : 'ON TIME';
                                statusStyle = statusText.includes('DELAY') 
                                    ? 'text-amber-400 border-amber-500/20 bg-amber-500/5' 
                                    : 'text-emerald-400 border-emerald-500/20 bg-emerald-500/5';
                            }
                        }

                        // TIME CORRECTION: Filter out old trains using a clean mathematical millisecond difference
                        const timeDiffMinutes = (finalDeparture.getTime() - now.getTime()) / 60000;
                        if (timeDiffMinutes < -10 || timeDiffMinutes > 240) return; // Wide 4-hour window to catch timezone drifts

                        const rawStop = originLeg.relationships?.stop?.data?.id || '';
                        const finalParentId = parentStopsMap[rawStop] || rawStop;
                        
                        let displayOrigin = 'Unknown Station';
                        if (finalParentId.includes('sstat')) displayOrigin = 'South Station';
                        else if (finalParentId.includes('bbay') || rawStop.toLowerCase().includes('back')) displayOrigin = 'Back Bay';
                        else if (finalParentId.includes('rugg')) displayOrigin = 'Ruggles';

                        const routeId = originLeg.relationships?.route?.data?.id || 'CR';

                        results.push({
                            key: `${tripId}-${displayOrigin}`, 
                            line: routeId.replace('CR-', '') + ' Line',
                            origin: displayOrigin,
                            dep: finalDeparture,
                            eta: finalArrival,
                            status: statusText,
                            statusStyle: statusStyle
                        });
                    });
                }

                const cleanLookup = {};
                results.forEach(r => { cleanLookup[r.key] = r; });
                cachedRuns = Object.values(cleanLookup).sort((a, b) => a.dep - b.dep);
                
                renderBoard();

            } catch (e) {
                console.error("Dashboard Engine Error Context:", e);
                document.getElementById('board-body').innerHTML = `<tr><td colspan="5" class="py-8 text-center text-rose-400 text-xs mono">TELEMETRY SYNC ERROR - RETRYING</td></tr>`;
            }
        }

        function renderBoard() {
            const boardBody = document.getElementById('board-body');
            
            let filteredRuns = cachedRuns;
            if (currentFilter !== 'ALL') {
                filteredRuns = cachedRuns.filter(r => r.origin === currentFilter);
            }

            // CRITICAL UI FAILSAFE: If the data array is empty, explicitly print it so the loading animation goes away
            if (filteredRuns.length === 0) {
                boardBody.innerHTML = `<tr><td colspan="5" class="py-12 text-center text-zinc-500 text-sm mono">NO SYSTEM TRAINS IN NEXT 4 HOURS (VERIFYING FEEDS)</td></tr>`;
                return;
            }

            boardBody.innerHTML = filteredRuns.map(r => `
                <tr class="hover:bg-zinc-900/40 transition-colors">
                    <td class="py-4 px-4 text-purple-400 font-semibold text-sm">${r.line}</td>
                    <td class="py-4 px-4 text-zinc-300 text-sm">${r.origin}</td>
                    <td class="py-4 px-4 mono text-zinc-100 font-bold text-sm">${formatTime(r.dep)}</td>
                    <td class="py-4 px-4 mono text-zinc-300 text-sm">${formatTime(r.eta)}</td>
                    <td class="py-4 px-4 text-right">
                        <span class="inline-block px-2 py-0.5 text-xs rounded border mono font-bold ${r.statusStyle}">${r.status}</span>
                    </td>
                </tr>
            `).join('');
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }, 1000);

        fetchCommuteDashboard();
        setInterval(fetchCommuteDashboard, 30000);
    </script>
</body>
</html>
